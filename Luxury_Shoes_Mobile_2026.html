<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luxury Shoes Mobile 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f5f5f5;--card:#fff;--text:#111;--gold:#c7a15d;--muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);padding-bottom:80px}
header{
position:sticky;top:0;z-index:100;
background:#111;color:#fff;padding:14px 16px;
}
.logo{font-size:22px;font-weight:700}
.filters{
display:flex;gap:8px;overflow:auto;padding:12px;
background:#fff;position:sticky;top:56px;z-index:99
}
.filters select{
border:none;background:#f1f1f1;border-radius:999px;
padding:10px 14px;font-size:14px
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;padding:12px;
}
.card{
background:#fff;border-radius:20px;
overflow:hidden;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.info{padding:12px}
.name{font-weight:700}
.meta{color:#666;font-size:13px;margin-top:4px}
.price{font-size:22px;font-weight:700;margin-top:8px;color:#111}
.badge{
position:absolute;top:10px;left:10px;
background:#16a34a;color:#fff;padding:5px 10px;
border-radius:999px;font-size:12px
}
.imgwrap{position:relative}
.wa{
position:fixed;bottom:90px;right:20px;
background:#25D366;color:#fff;text-decoration:none;
padding:14px 18px;border-radius:999px;font-weight:700;
box-shadow:0 8px 25px rgba(0,0,0,.25)
}
.bottom{
position:fixed;bottom:0;left:0;right:0;
background:#fff;border-top:1px solid #ddd;
display:flex;justify-content:space-around;
padding:12px;
}
.bottom div{text-align:center;font-size:12px}
</style>
</head>
<body>

<header>
<div class="logo">Luxury Shoes</div>
</header>

<div class="filters">
<select><option>Talla USA</option></select>
<select><option>Talla CM</option></select>
<select><option>Tipo de Suela</option></select>
<select><option>Color</option></select>
</div>

<div class="grid">
<div class="card">
<div class="imgwrap">
<div class="badge">Disponible</div>
<img src="https://via.placeholder.com/500x500">
</div>
<div class="info">
<div class="name">Zapato Deportivo</div>
<div class="meta">US 9 • 27 cm • Negro</div>
<div class="price">$85</div>
</div>
</div>

<div class="card">
<div class="imgwrap">
<div class="badge">Disponible</div>
<img src="https://via.placeholder.com/500x500">
</div>
<div class="info">
<div class="name">Zapato Casual</div>
<div class="meta">US 8 • 26 cm • Blanco</div>
<div class="price">$75</div>
</div>
</div>
</div>

<a class="wa" href="#">WhatsApp</a>

<div class="bottom">
<div>🏠<br>Inicio</div>
<div>👟<br>Tallas</div>
<div>🔥<br>Destacados</div>
<div>💬<br>Contacto</div>
</div>

</body>
</html>
